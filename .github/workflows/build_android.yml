name: Build Android APK

on:
  push:
    branches: [ "main" ] # تأكد أنها main هنا

  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # سنستخدم خادم أوبونتو الأحدث للبناء

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Qt
        # هذه خطوة جاهزة من المجتمع لتثبيت Qt في بيئة الـ CI
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.2' # إصدار Qt المستخدم (يمكنك تغييره لـ 6.6.x إذا أردت الأحدث)
          target: 'android' # الهدف هو أندرويد
          arch: 'android_arm64' # المعمارية المستهدفة (أكثر الهواتف الحديثة تدعمها)
          dir: ${{ github.workspace }}/Qt
          # إذا كان مشروعك يستخدم مكتبات إضافية غير Core, Gui, Sql, Qml, Multimedia, Widgets
          # قم بإضافتها هنا في خانة 'modules' مفصولة بفراغ، مثال: 'qtcharts qtsvg'
          modules: 'qtmultimedia' 

      - name: Set up Android NDK
        # تحديد متغير البيئة لمسار NDK ليستخدمه CMake
        run: |
          echo "ANDROID_NDK_ROOT=${{ github.workspace }}/Qt/6.5.2/android_arm64/ndk" >> $GITHUB_ENV
          # هام: إصدار NDK الذي يثبته الـ install-qt-action قد يختلف قليلاً
          # في أغلب الأحيان يتم اكتشافه تلقائياً، لكن هذا السطر احتياطي.

      - name: Configure CMake
        # تنفيذ أمر تهيئة المشروع. تأكد أن ملف CMakeLists.txt في الجذر.
        run: |
          mkdir build_android
          cd build_android
          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/Qt/6.5.2/android_arm64/ndk/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/6.5.2/android_arm64/ \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build with Ninja
        # بدء عملية البناء الفعلي
        run: |
          cd build_android
          cmake --build . --parallel $(nproc)

      - name: Find APK
        id: find_apk
        # البحث عن ملف الـ APK الناتج
        run: |
          # عادة ما يكون المسار التالي هو الصحيح في Qt6
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      - name: Upload APK as Artifact
        # تحميل ملف الـ APK النهائي من خادم GitHub إلى جهازك
        uses: actions/upload-artifact@v3
        with:
          name: SocialApp-Android-Debug
          path: ${{ steps.find_apk.outputs.apk_path }}
